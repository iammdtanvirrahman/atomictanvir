<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realistic Quantum Monte Carlo Orbitals</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
}
#menu {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 100;
}
button {
    padding: 10px 15px;
    margin: 3px;
    border: none;
    border-radius: 6px;
    background: #1f2d4d;
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
}
button:hover, button.active { background: #4a7be8; }

#info {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: #9fdcff;
    background: rgba(0, 0, 0, 0.6);
    padding: 10px;
    border-radius: 8px;
    pointer-events: none;
    font-size: 14px;
    line-height: 1.4;
}

#progressPanel {
    position: absolute;
    top: 6000px;
    right: 10px;
    width: 170px;
    z-index: 200;
    color: white;
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 12px;
    display: none;
}
#progressTitle {
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 13px;
    color: #cfe7ff;
}
#progressText {
    font-size: 22px;
    font-weight: 900;
    line-height: 1;
}
#progressBar {
    margin-top: 10px;
    height: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
}
#progressFill {
    height: 100%;
    width: 0%;
    background: #4a7be8;
    border-radius: 999px;
    transition: width 0.05s linear;
}
</style>
</head>
<body>

<div id="menu">
    <button id="btn-1s" onclick="loadOrbital('1s')">1s</button>
    <button id="btn-2s" onclick="loadOrbital('2s')">2s</button>
    <button id="btn-2pz" onclick="loadOrbital('2pz')">2p (z)</button>
    <button id="btn-3dz2" onclick="loadOrbital('3dz2')">3d (z²)</button>
    <button id="btn-3dx2y2" onclick="loadOrbital('3dx2y2')">3d (x²-y²)</button>
</div>

<div id="info">
    <b>Quantum Probability Density</b><br>
    Rendered via Monte Carlo Rejection Sampling.<br>
    Red/Blue indicate wave function phase (+/-).<br>
    developed by Md Tanvir Rahman
</div>

<div id="progressPanel">
    <div id="progressTitle">Generating</div>
    <div id="progressText">0%</div>
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>
</div>

<script type="module">
import * as THREE from "https://esm.sh/three@0.160.0";
import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";

// --- SCENE SETUP ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 20);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const grid = new THREE.GridHelper(30, 30, 0x444444, 0x222222);
scene.add(grid);

let orbitalGroup = new THREE.Group();
scene.add(orbitalGroup);

// --- QUANTUM MECHANICS MATH ---
const wavefunctions = {
    '1s': (x, y, z) => Math.exp(-Math.sqrt(x*x + y*y + z*z)),
    '2s': (x, y, z) => {
        const r = Math.sqrt(x*x + y*y + z*z);
        return (2 - r) * Math.exp(-r / 2);
    },
    '2pz': (x, y, z) => {
        const r = Math.sqrt(x*x + y*y + z*z);
        return z * Math.exp(-r / 2);
    },
    '3dz2': (x, y, z) => {
        const r = Math.sqrt(x*x + y*y + z*z);
        return (3 * z*z - r*r) * Math.exp(-r / 3);
    },
    '3dx2y2': (x, y, z) => {
        const r = Math.sqrt(x*x + y*y + z*z);
        return (x*x - y*y) * Math.exp(-r / 3);
    }
};

const orbitalConfigs = {
    '1s':     { box: 8,  maxProb: 1.0 },
    '2s':     { box: 15, maxProb: 0.15 },
    '2pz':    { box: 15, maxProb: 0.15 },
    '3dz2':   { box: 30, maxProb: 0.05 },
    '3dx2y2': { box: 30, maxProb: 0.05 }
};

const PHASE_POS_COLOR = new THREE.Color(0xff4444);
const PHASE_NEG_COLOR = new THREE.Color(0x4488ff);
const PARTICLE_COUNT = 40000;

let isGenerating = false;

// Progress UI
const progressPanel = document.getElementById('progressPanel');
const progressText = document.getElementById('progressText');
const progressFill = document.getElementById('progressFill');

function setProgress(p01) {
    const pct = Math.max(0, Math.min(100, Math.round(p01 * 100)));
    progressText.textContent = `${pct}%`;
    progressFill.style.width = `${pct}%`;
}

// Faster generation for 1s by allowing a bit more time per chunk.
// (Still chunked, so previewer shouldn't freeze.)
const timeBudgetByOrbital = {
    '1s': 20,
    '2s': 10,
    '2pz': 10,
    '3dz2': 10,
    '3dx2y2': 10
};

function generateCloud(type) {
    scene.remove(orbitalGroup);
    orbitalGroup = new THREE.Group();
    scene.add(orbitalGroup);

    const config = orbitalConfigs[type];
    const psiFunc = wavefunctions[type];

    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.PointsMaterial({
        size: 0.2,
        vertexColors: true,
        transparent: true,
        opacity: 0.4,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });

    const points = new THREE.Points(geo, mat);
    points.geometry.setDrawRange(0, 0);
    orbitalGroup.add(points);

    let generated = 0;
    let attempts = 0;
    const maxAttempts = PARTICLE_COUNT * 1000;
    const L = config.box;
    const maxProb = config.maxProb;

    isGenerating = true;
    setProgress(0);

    function generateBatch() {
        if (!isGenerating) return;

        const start = performance.now();
        const timeBudgetMs = timeBudgetByOrbital[type] ?? 10;
        let batchGenerated = 0;

        while (generated < PARTICLE_COUNT && attempts < maxAttempts) {
            if (performance.now() - start > timeBudgetMs) break;

            attempts++;

            const x = (Math.random() - 0.5) * L * 2;
            const y = (Math.random() - 0.5) * L * 2;
            const z = (Math.random() - 0.5) * L * 2;

            const psi = psiFunc(x, y, z);
            const probDensity = psi * psi;

            if (Math.random() * maxProb < probDensity) {
                const color = (psi > 0) ? PHASE_POS_COLOR : PHASE_NEG_COLOR;

                positions[generated * 3] = x;
                positions[generated * 3 + 1] = y;
                positions[generated * 3 + 2] = z;

                colors[generated * 3] = color.r;
                colors[generated * 3 + 1] = color.g;
                colors[generated * 3 + 2] = color.b;

                generated++;
                batchGenerated++;
            }
        }

        if (batchGenerated > 0) setProgress(generated / PARTICLE_COUNT);

        points.geometry.setDrawRange(0, generated);
        points.geometry.attributes.position.needsUpdate = true;
        points.geometry.attributes.color.needsUpdate = true;

        if (generated < PARTICLE_COUNT && attempts < maxAttempts) {
            setTimeout(generateBatch, 0);
        } else {
            isGenerating = false;
            setProgress(1);
            progressPanel.style.display = 'none';
            if (attempts >= maxAttempts) console.warn("Hit max attempts limit.");
        }
    }

    generateBatch();
}

window.loadOrbital = function(type) {
    isGenerating = false;
    document.querySelectorAll('#menu button').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${type}`).classList.add('active');

    progressPanel.style.display = 'block';
    setProgress(0);

    setTimeout(() => generateCloud(type), 10);
};

loadOrbital('2pz');

function animate() {
    requestAnimationFrame(animate);
    orbitalGroup.rotation.y += 0.002;
    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
