<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Hole Accretion Disk</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #050505; /* Deep space black */
    font-family: Arial, sans-serif;
}
#menu {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 100;
}
button {
    padding: 10px 15px;
    margin: 3px;
    border: none;
    border-radius: 6px;
    background: #1f2d4d;
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
}
button:hover, button.active { background: #4a7be8; }

#info {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: #9fdcff;
    background: rgba(0, 0, 0, 0.6);
    padding: 10px;
    border-radius: 8px;
    pointer-events: none;
    font-size: 14px;
    line-height: 1.4;
}

#progressPanel {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 170px;
    z-index: 200;
    color: white;
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 12px;
    display: none;
}
#progressTitle {
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 13px;
    color: #cfe7ff;
}
#progressText {
    font-size: 22px;
    font-weight: 900;
    line-height: 1;
}
#progressBar {
    margin-top: 10px;
    height: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
}
#progressFill {
    height: 100%;
    width: 0%;
    background: #e88e4a;
    border-radius: 999px;
    transition: width 0.05s linear;
}
</style>
</head>
<body>

<div id="menu">
    <button id="btn-disk" class="active" onclick="generateAccretionDisk()">Generate Accretion Disk</button>
</div>

<div id="info">
    <b>Black Hole Accretion Disk</b><br>
    Monte Carlo Density Sampling & Keplerian Motion.<br>
    Inner particles (blue/white) orbit faster and are hotter.
</div>

<div id="progressPanel">
    <div id="progressTitle">Gathering Matter</div>
    <div id="progressText">0%</div>
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>
</div>

<script type="module">
import * as THREE from "https://esm.sh/three@0.160.0";
import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";

// --- SCENE SETUP ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 8, 25);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
// Add a slight bloom effect implicitly using blending later
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.maxDistance = 60;

// Central Black Hole (Event Horizon)
const eventHorizonRadius = 2.0;
const bhGeometry = new THREE.SphereGeometry(eventHorizonRadius, 64, 64);
const bhMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
const blackHole = new THREE.Mesh(bhGeometry, bhMaterial);
scene.add(blackHole);

let diskGroup = new THREE.Group();
scene.add(diskGroup);

const PARTICLE_COUNT = 60000;
let isGenerating = false;

// We need these arrays accessible to the animation loop for orbital motion
let diskPoints;
let radiiArray = new Float32Array(PARTICLE_COUNT);
let anglesArray = new Float32Array(PARTICLE_COUNT);
let speedsArray = new Float32Array(PARTICLE_COUNT);
let yOffsetsArray = new Float32Array(PARTICLE_COUNT);

// Progress UI
const progressPanel = document.getElementById('progressPanel');
const progressText = document.getElementById('progressText');
const progressFill = document.getElementById('progressFill');

function setProgress(p01) {
    const pct = Math.max(0, Math.min(100, Math.round(p01 * 100)));
    progressText.textContent = `${pct}%`;
    progressFill.style.width = `${pct}%`;
}

window.generateAccretionDisk = function() {
    if (isGenerating) return;
    
    scene.remove(diskGroup);
    diskGroup = new THREE.Group();
    scene.add(diskGroup);

    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.PointsMaterial({
        size: 0.15,
        vertexColors: true,
        transparent: true,
        opacity: 0.6,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });

    diskPoints = new THREE.Points(geo, mat);
    diskPoints.geometry.setDrawRange(0, 0);
    diskGroup.add(diskPoints);

    let generated = 0;
    let attempts = 0;
    const maxAttempts = PARTICLE_COUNT * 2000;
    const maxRadius = 18.0;
    
    // Max density happens right outside the event horizon
    const maxDensity = 1.0; 

    isGenerating = true;
    progressPanel.style.display = 'block';
    setProgress(0);

    function generateBatch() {
        if (!isGenerating) return;
        const start = performance.now();
        let batchGenerated = 0;

        while (generated < PARTICLE_COUNT && attempts < maxAttempts) {
            if (performance.now() - start > 15) break; 
            attempts++;

            // Disk is primarily in the XZ plane, with slight Y thickness
            const x = (Math.random() - 0.5) * maxRadius * 2;
            const z = (Math.random() - 0.5) * maxRadius * 2;
            const r = Math.sqrt(x*x + z*z);
            
            // Matter falls in, but thickens slightly outward. 
            // We use a Gaussian distribution for height based on radius.
            const thickness = 0.1 + (r * 0.05); 
            const y = (Math.random() - 0.5) * thickness * 4; 

            // 1. REJECTION LOGIC
            if (r <= eventHorizonRadius * 1.1 || r > maxRadius) continue;

            // 2. PROBABILITY DENSITY
            // Density falls off exponentially with distance and height
            const radialDensity = Math.pow((eventHorizonRadius * 1.1) / r, 1.5);
            const verticalDensity = Math.exp(-(y*y) / (2 * thickness * thickness));
            const probability = radialDensity * verticalDensity;

            if (Math.random() * maxDensity < probability) {
                // 3. KEPLERIAN ORBIT DATA
                radiiArray[generated] = r;
                anglesArray[generated] = Math.atan2(z, x);
                // v = sqrt(GM/r). We make GM an arbitrary constant for aesthetics
                speedsArray[generated] = 0.05 / Math.sqrt(r); 
                yOffsetsArray[generated] = y;

                // 4. TEMPERATURE/COLOR MAPPING
                // Closer = Hotter (Blue/White), Further = Cooler (Orange/Red)
                const normalizedDist = (r - eventHorizonRadius) / (maxRadius - eventHorizonRadius);
                
                const color = new THREE.Color();
                if (normalizedDist < 0.15) {
                    // X-Ray / Intense Blue-White near the horizon
                    color.setHSL(0.55, 0.8, 1.0 - (normalizedDist * 3));
                } else {
                    // Fades to Orange/Red
                    color.setHSL(0.1 - (normalizedDist * 0.1), 0.9, 0.6 - (normalizedDist * 0.4));
                }

                positions[generated * 3] = x;
                positions[generated * 3 + 1] = y;
                positions[generated * 3 + 2] = z;

                colors[generated * 3] = color.r;
                colors[generated * 3 + 1] = color.g;
                colors[generated * 3 + 2] = color.b;

                generated++;
                batchGenerated++;
            }
        }

        if (batchGenerated > 0) setProgress(generated / PARTICLE_COUNT);
        diskPoints.geometry.setDrawRange(0, generated);
        diskPoints.geometry.attributes.position.needsUpdate = true;
        diskPoints.geometry.attributes.color.needsUpdate = true;

        if (generated < PARTICLE_COUNT && attempts < maxAttempts) {
            setTimeout(generateBatch, 0);
        } else {
            isGenerating = false;
            setProgress(1);
            setTimeout(() => progressPanel.style.display = 'none', 500);
            if (attempts >= maxAttempts) console.warn("Hit max attempts limit.");
        }
    }

    generateBatch();
};

// Start generation on load
generateAccretionDisk();

function animate() {
    requestAnimationFrame(animate);
    
    // Update particle positions for Keplerian motion
    if (diskPoints && !isGenerating) {
        const positions = diskPoints.geometry.attributes.position.array;
        const count = diskPoints.geometry.drawRange.count;
        
        for (let i = 0; i < count; i++) {
            // Update angle based on orbital speed
            anglesArray[i] += speedsArray[i];
            
            // Recalculate X and Z
            positions[i * 3] = radiiArray[i] * Math.cos(anglesArray[i]);
            positions[i * 3 + 1] = yOffsetsArray[i]; // Y stays the same
            positions[i * 3 + 2] = radiiArray[i] * Math.sin(anglesArray[i]);
        }
        diskPoints.geometry.attributes.position.needsUpdate = true;
    }

    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
